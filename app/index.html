function renderPanels(d){document.getElementById("yearLabel").textContent=fy(d.year);document.getElementById("timeline").value=Math.round(state.target*1000);document.getElementById("timelineNote").textContent=`${d.era.sound} / ${fy(d.year)}`;document.getElementById("focusPanel").hidden=state.panel!=="focus";document.getElementById("periodPanel").hidden=state.panel!=="periods";document.getElementById("storyPanel").hidden=state.panel!=="stories";document.getElementById("focusPanel").innerHTML=`<span>${fy(d.year)}</span><strong>${esc(d.era.name)}</strong><p>${esc(d.era.focus)}</p><em>Sound: ${esc(d.era.sound)}</em><small>${d.ls.length} visible relationships / ${d.pe.length} in period graph</small><small>${d.base.isolated} isolated records hidden from the visual layer</small>`;document.getElementById("periodPanel").innerHTML=eras.map((e,i)=>`<button data-era="${i}" class="${i===d.ei?"active":""}"><span>${fy(e.from)}-${fy(e.to)}</span><strong>${esc(e.name)}</strong></button>`).join("");document.getElementById("storyPanel").innerHTML=`<p class="eyebrow">Ready research stories</p>${d.storyList.map(s=>`<button data-story="${esc(s.id)}" class="${state.story===s.id?"active":""}"><em>${esc(s.question)}</em><strong>${esc(s.title)}</strong><span>${esc(s.note)}</span></button>`).join("")}`;const n=d.sel;document.getElementById("detailPanel").innerHTML=n?`<span>${labels(n.labels).join(" / ")||"Record"}</span><h2>${esc(title(n))}</h2><p>${esc(desc(n))}</p><div class="path">${esc(fy(n.year))} / ${n.score||0} relationships</div>${d.paths.map(({edge,node})=>`<div class="path">${esc(edge.type.replaceAll("_"," "))}<br><strong>${esc(title(node))}</strong></div>`).join("")}`:`<span>Kartvelian record</span><h2>Select evidence</h2><p>Scroll vertically to move the timeline. Click a visible node to inspect nearby relationships.</p>`}

arget;else{state.progress+=dist*.14;state.af=requestAnimationFrame(step)}render()};state.af=requestAnimationFrame(step)}
async function load(){const[graph,stats]=await Promise.all([fetch("/api/graph").then(r=>r.json()),fetch("/api/stats").then(r=>r.json())]);state.nodes=(graph.nodes||[]).map(normNode);state.edges=(graph.relationships||graph.edges||[]).map(normEdge).filter(e=>e.source&&e.target);document.getElementById("stats").textContent=`${stats.nodes} records / ${stats.relationships} relationships / ${stats.dataSource||"snapshot"}`;render()}
document.getElementById("page").addEventListener("wheel",e=>{if(state.panel==="periods")return;e.preventDefault();if(Math.abs(e.deltaX)>Math.abs(e.deltaY))return;schedule(Math.sign(e.deltaY)*Math.min(.032,Math.abs(e.deltaY)*.00008))},{passive:false});document.getElementById("page").addEventListener("touchstart",e=>{const t=e.touches[0];state.touch=t?{x:t.clientX,y:t.clientY}:null},{passive:true});document.getElementById("page").addEventListener("touchmove",e=>{if(!state.touch||state.panel==="periods")return;e.preventDefault();const t=e.touches[0];if(!t)return;const dx=t.clientX-state.touch.x,dy=state.touch.y-t.clientY;state.touch={x:t.clientX,y:t.clientY};if(Math.abs(dx)>Math.abs(dy))return;schedule(dy*.00028)},{passive:false});document.getElementById("timeline").addEventListener("input",e=>setP(Number(e.target.value)/1000));document.getElementById("prevEra").addEventListener("click",()=>jump(-1));document.getElementById("nextEra").addEventListener("click",()=>jump(1));document.getElementById("storiesBtn").addEventListener("click",()=>setPanel("stories"));document.getElementById("focusBtn").addEventListener("click",()=>setPanel("focus"));document.getElementById("periodsBtn").addEventListener("click",()=>setPanel("periods"));document.getElementById("periodPanel").addEventListener("click",e=>{const b=e.target.closest("button[data-era]");if(b)selectEra(Number(b.dataset.era))});document.getElementById("storyPanel").addEventListener("click",e=>{const b=e.target.closest("button[data-story]");if(!b)return;const s=computed().storyList.find(x=>x.id===b.dataset.story);if(s)openStory(s)});document.getElementById("topStory").addEventListener("click",()=>{const s=computed().storyList[1]||computed().storyList[0];if(s)openStory(s)});document.getElementById("search").addEventListener("input",e=>{const q=e.target.value.trim().toLowerCase();if(q.length<2)return;const h=state.nodes.find(n=>[n.name,n.title,n.description,n.id].filter(Boolean).join(" ").toLowerCase().includes(q));if(!h)r
